<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Corp Terminal</title>
    <link rel="stylesheet" href="../css/ghost-reports.css">
</head>

<body class="terminal-body">

    <header>
        <nav>
            <a href="../../index.html">Home</a>
            <a href="ghost-reports.html" class="active">The Gorilla Corp Terminal</a>
            <a href="cosmetics.html">Cosmetics Pack</a>
        </nav>
    </header>

    <main class="terminal-container">
        <h1>Gorilla Corp Monitoring Dashboard</h1>

        <section class="terminal-card audio-section">
            <h2>Intercepted Audio Log</h2>
            <button id="play-audio-btn">Play message from Dylan</button>
            
            <div class="volume-mixer">
                <label for="volume-slider">VOLUME:</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
                <span id="volume-percent">50%</span>
            </div>

            <audio id="terminal-audio" src="../assets/GhostReactorEvacuation.ogg"></audio>
            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>
        </section>

        <section class="terminal-card drill-section">
            <h2>Drill Operation Status</h2>

            <div class="status-display">
                <p>System Status: <span id="drill-status" class="status-idle">IDLE</span></p>
                <p>Current Depth: <span id="drill-depth">1000m</span></p>
            </div>

            <div class="terminal-console">
                <div id="console-feed">> Gorilla Corp OS v1.0.4 Initalized...</div>
            </div>

            <div class="control-panel">
                <button id="reset-drill-btn" class="danger-btn">EMERGENCY RESET (1000m)</button>
            </div>
        </section>
    </main>

    <script src="../js/drill.js"></script>
</body>

</html>
